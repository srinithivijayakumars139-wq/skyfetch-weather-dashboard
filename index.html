<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyFetch Weather Dashboard</title>

<link rel="stylesheet" href="style.css">

<!-- Axios CDN -->
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

</head>

<body>

<div class="container">

<h1>🌤️ SkyFetch Weather Dashboard</h1>

<div class="search-section">

<input
id="city-input"
type="text"
placeholder="Enter city name"
/>

<button id="search-btn">
Search
</button>

</div>


<!-- Recent Searches Section -->
<div id="recent-searches-section" class="recent-searches-section">

<div class="recent-header">

<h4>Recent Searches</h4>

<button id="clear-history-btn" class="clear-history-btn">
Clear
</button>

</div>

<div id="recent-searches-container"></div>

</div>


<!-- Weather Display -->
<div id="weather-display"></div>

</div>

<script src="app.js"></script>

</body>
</html>
